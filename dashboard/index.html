<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dashboard</title>
</head>

<body class="state-neutral text-white font-sans antialiased h-screen flex flex-col overflow-hidden transition-colors duration-500">
  <!-- Ambient color overlay driven by GO/STOP state -->
  <div id="color-overlay"></div>
  <div id="app" class="flex flex-col h-full opacity-0 transition-opacity duration-300">
    <!-- Header -->
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center border-b border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-xl">V</div>
        <h1 class="text-2xl font-bold tracking-wide">VShuttle Dashboard</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-gray-400 text-sm">Status:</div>
        <div id="system-status-indicator"
          class="w-4 h-4 rounded-full bg-gray-500 shadow-[0_0_10px_rgba(107,114,128,0.5)]"></div>
        <div id="system-status-text"
          class="font-semibold px-3 py-1 bg-gray-700 rounded-md text-sm uppercase tracking-wider">Idle</div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col p-6 gap-6 relative">

      <!-- Timer Overlay (Hidden by default) -->
      <div id="timer-overlay"
        class="absolute inset-0 bg-black/95 backdrop-blur-md z-10 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="text-2xl font-semibold text-gray-300 mb-2 uppercase tracking-widest">Azione in sospeso</div>
        <div id="overlay-suggested-action"
          class="text-6xl font-black mb-12 drop-shadow-lg uppercase tracking-widest text-gray-500">ATTESA CONFERMA</div>

        <div class="text-6xl font-black text-white mb-8 drop-shadow-[0_0_20px_rgba(255,255,255,0.5)]"
          id="countdown-text">2.0s</div>
        <div class="flex gap-8 w-full max-w-4xl px-8">
          <button id="btn-override"
            class="flex-1 py-8 text-4xl font-bold bg-gray-800 hover:bg-gray-700 text-white rounded-2xl border-4 border-gray-600 shadow-2xl active:scale-95 transition-all outline-none focus:ring-4 focus:ring-gray-500">OVERRIDE</button>
          <button id="btn-confirm"
            class="flex-1 py-8 text-4xl font-bold bg-amber-500 hover:bg-amber-400 text-black rounded-2xl border-4 border-amber-600 shadow-2xl shadow-amber-500/20 active:scale-95 transition-all outline-none focus:ring-4 focus:ring-amber-300">CONFERMA</button>
        </div>
      </div>

      <!-- Scenario Information -->
      <div class="flex flex-col flex-1 gap-6">
        <div class="flex gap-6 h-full">

          <!-- Left Panel: Context -->
          <div id="panel-left" class="w-1/3 bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700 flex flex-col gap-4 transition-colors duration-500">
            <h2 class="text-xl font-semibold text-gray-300 border-b border-gray-700 pb-2">Analisi Sensori</h2>

            <div class="flex-1 flex flex-col gap-6 pt-2">
              <div>
                <div class="flex justify-between items-center mb-2">
                  <span class="text-gray-400">Livello Confidenza</span>
                  <span id="confidence-value" class="font-bold text-xl">--%</span>
                </div>
                <!-- Progress bar -->
                <div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden relative border border-gray-600">
                  <div id="confidence-bar" class="bg-gray-500 h-4 rounded-full transition-all duration-500 w-0"></div>
                </div>
              </div>

              <div
                class="bg-gray-900 rounded-lg p-5 flex-1 border border-gray-700/50 flex flex-col justify-center gap-4">
                <div class="text-sm text-gray-400 uppercase tracking-widest font-semibold flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  Azione Corrente
                </div>
                <div id="suggested-action"
                  class="text-4xl font-black text-center text-gray-500 uppercase tracking-widest drop-shadow-md">
                  --
                </div>
              </div>
            </div>
          </div>

          <!-- Right Panel: Text Parser Output -->
          <div id="panel-right" class="flex-1 bg-gray-800 rounded-xl shadow-lg border border-gray-700 flex flex-col overflow-hidden transition-colors duration-500">
            <div class="bg-gray-900/50 p-4 border-b border-gray-700 flex items-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
              </svg>
              <h2 class="text-lg font-semibold text-gray-300">Motivazione</h2>
            </div>
            <div class="p-8 flex-1 flex items-center justify-center bg-gradient-to-br from-gray-800 to-gray-900">
              <p id="parsed-text"
                class="text-4xl leading-tight font-medium text-center text-gray-400 max-w-3xl drop-shadow-sm transition-all duration-300">
                In attesa di avvio simulazione...
              </p>
            </div>
          </div>

        </div>
      </div>
    </main>

    <!-- Bottom Controls -->
    <footer class="bg-gray-800 p-6 border-t border-gray-700 flex justify-center shadow-[0_-4px_20px_rgba(0,0,0,0.2)]">
      <button id="btn-start"
        class="w-full max-w-2xl py-6 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white text-3xl font-bold shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-all active:scale-95 outline-none focus:ring-4 focus:ring-indigo-400">
        START SIMULATION
      </button>
      <!-- Visible only when running to stop simulation if needed, though not strictly required, could be useful -->
      <button id="btn-stop-sim"
        class="hidden w-full max-w-2xl py-6 rounded-2xl bg-red-600 hover:bg-red-500 text-white text-3xl font-bold shadow-[0_0_20px_rgba(220,38,38,0.4)] transition-all active:scale-95 outline-none focus:ring-4 focus:ring-red-400">
        STOP SIMULATION
      </button>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</body>

</html>
